<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T1 Grade Tracker | UNSW</title>
    <style>
        :root {
            --bg: #0b0f19;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --mtrn: #f43f5e;
            --manf: #10b981;
            --elec: #8b5cf6;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 1000px; }
        header { text-align: center; margin-bottom: 2rem; }
        h1 { margin: 0 0 0.5rem; color: var(--accent); font-size: 2.5rem; letter-spacing: -1px; }
        p { color: #94a3b8; margin: 0; }

        .sync-panel {
            background: rgba(56, 189, 248, 0.05);
            border: 1px dashed var(--accent);
            padding: 1.5rem;
            border-radius: 1rem;
            margin-bottom: 2.5rem;
        }
        .sync-row { display: flex; gap: 10px; margin-top: 10px; }
        .sync-btn { flex: 1; padding: 10px; border-radius: 6px; font-weight: bold; border: none; cursor: pointer; color: white; }
        .sync-push { background: #6366f1; }
        .sync-pull { background: #10b981; }

        .grid { display: grid; gap: 1.5rem; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
        
        .card {
            background: var(--card); padding: 1.5rem; border-radius: 1rem;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2);
        }

        .course-header { margin-bottom: 1rem; border-bottom: 1px solid #334155; padding-bottom: 1rem; }
        .course-title { font-size: 1.3rem; font-weight: 800; }
        .course-desc { font-size: 0.85rem; color: #94a3b8; display: block; margin-top: 0.2rem; }

        .stats { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.5rem; }
        .current-grade { font-size: 2rem; font-weight: 800; }
        .banked-text { font-size: 0.85rem; color: #cbd5e1; }

        .progress-bg { background: #0f172a; height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 1.5rem; }
        .progress-fill { height: 100%; transition: width 0.5s ease; }
        
        .mtrn-fill { background: var(--mtrn); }
        .manf-fill { background: var(--manf); }
        .elec-fill { background: var(--elec); }

        .input-zone { background: #0f172a; padding: 1rem; border-radius: 0.75rem; margin-bottom: 1rem; }
        input { 
            width: 100%; background: #1e293b; border: 1px solid #334155; 
            color: white; padding: 0.6rem; border-radius: 0.4rem; margin-bottom: 0.5rem; 
            box-sizing: border-box; font-family: inherit;
        }
        input:focus { outline: none; border-color: var(--accent); }
        
        .row { display: flex; gap: 0.5rem; }
        .row input { margin-bottom: 0; }

        button.add-btn {
            width: 100%; background: var(--accent); color: #0f172a; border: none;
            padding: 0.75rem; border-radius: 0.4rem; font-weight: bold; cursor: pointer; 
            margin-top: 0.75rem; transition: opacity 0.2s;
        }

        .item-list { list-style: none; padding: 0; margin: 0; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 0; border-bottom: 1px solid #334155; }
        .item:last-child { border-bottom: none; }
        .item-info { display: flex; flex-direction: column; gap: 0.2rem; }
        .item-name { font-weight: 600; font-size: 0.95rem; }
        .item-math { font-size: 0.75rem; color: #94a3b8; }
        .item-result { display: flex; align-items: center; gap: 1rem; }
        .banked-badge { background: #334155; padding: 0.2rem 0.5rem; border-radius: 0.25rem; font-size: 0.8rem; font-weight: bold; }
        .del-btn { background: transparent; color: #ef4444; padding: 0.2rem; border: none; cursor: pointer; font-size: 1.2rem; }
        
        .loading { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Term 1 Tracker</h1>
        <p>Real math for real engineering assessments.</p>
    </header>

    <div class="sync-panel" id="syncPanel">
        <label style="font-size: 0.8rem; font-weight: bold; color: var(--accent);">☁️ DEVICE SYNC</label>
        <input type="text" id="syncKeyInput" placeholder="Enter Sync Key to Pull, or leave blank to Push a new one">
        <div class="sync-row">
            <button class="sync-btn sync-push" onclick="pushToCloud()">↑ Push to Cloud</button>
            <button class="sync-btn sync-pull" onclick="pullFromCloud()">↓ Pull from Cloud</button>
        </div>
        <div id="syncStatus" style="font-size: 0.8rem; margin-top: 10px; text-align: center;"></div>
    </div>

    <div class="grid" id="dashboard"></div>
</div>

<script>
    const defaultData = {
        mtrn: { id: 'mtrn', code: 'MTRN3020', name: 'Mechatronic Control', color: 'mtrn', assessments: [] },
        manf: { id: 'manf', code: 'MANF6860', name: 'Strategic Mfg Mgmt', color: 'manf', assessments: [] },
        elec: { id: 'elec', code: 'ELEC4122', name: 'Strategic Leadership & Ethics', color: 'elec', assessments: [] }
    };

    let courses = JSON.parse(localStorage.getItem('t1_marks')) || defaultData;

    function saveAndRender() {
        localStorage.setItem('t1_marks', JSON.stringify(courses));
        const dashboard = document.getElementById('dashboard');
        dashboard.innerHTML = '';

        Object.values(courses).forEach(course => {
            let bankedMarks = 0;
            let weightAttempted = 0;

            course.assessments.forEach(task => {
                const percentageScore = (task.score / task.outOf);
                bankedMarks += percentageScore * task.weight;
                weightAttempted += task.weight;
            });

            const runningAverage = weightAttempted > 0 ? ((bankedMarks / weightAttempted) * 100).toFixed(1) : 0;

            // Cleanly build the list items first to avoid nested template literal errors
            let listHTML = '';
            course.assessments.forEach((task, index) => {
                const earned = ((task.score / task.outOf) * task.weight).toFixed(1);
                listHTML += `
                <li class="item">
                    <div class="item-info">
                        <span class="item-name">${task.name}</span>
                        <span class="item-math">Scored ${task.score}/${task.outOf} (Worth ${task.weight}%)</span>
                    </div>
                    <div class="item-result">
                        <span class="banked-badge">+${earned}</span>
                        <button class="del-btn" onclick="deleteTask('${course.id}', ${index})">×</button>
                    </div>
                </li>`;
            });

            // Construct the main card HTML
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="course-header">
                    <div class="course-title">${course.code}</div>
                    <div class="course-desc">${course.name}</div>
                </div>
                <div class="stats">
                    <div class="current-grade">${runningAverage}%</div>
                    <div class="banked-text">Banked: <b>${bankedMarks.toFixed(1)} / ${weightAttempted}</b></div>
                </div>
                <div class="progress-bg">
                    <div class="progress-fill ${course.color}-fill" style="width: ${runningAverage}%"></div>
                </div>
                <div class="input-zone">
                    <input type="text" id="name-${course.id}" placeholder="Task (e.g., Seminar Quiz)">
                    <div class="row">
                        <input type="number" id="score-${course.id}" placeholder="Score (e.g., 17)">
                        <input type="number" id="outof-${course.id}" placeholder="Out Of (e.g., 20)">
                    </div>
                    <div class="row">
                        <input type="number" id="weight-${course.id}" placeholder="Weight % (e.g., 15)">
                        <button class="add-btn" onclick="addTask('${course.id}')">Add</button>
                    </div>
                </div>
                <ul class="item-list">${listHTML}</ul>
            `;
            dashboard.appendChild(card);
        });
    }

    function addTask(courseId) {
        const nameInput = document.getElementById(`name-${courseId}`);
        const scoreInput = document.getElementById(`score-${courseId}`);
        const outOfInput = document.getElementById(`outof-${courseId}`);
        const weightInput = document.getElementById(`weight-${courseId}`);

        const name = nameInput.value.trim();
        const score = parseFloat(scoreInput.value);
        const outOf = parseFloat(outOfInput.value);
        const weight = parseFloat(weightInput.value);

        if (name && !isNaN(score) && !isNaN(outOf) && !isNaN(weight) && outOf > 0) {
            courses[courseId].assessments.push({ name, score, outOf, weight });
            saveAndRender();
        } else {
            alert("Please ensure all fields are correctly filled before adding an assessment.");
        }
    }

    function deleteTask(courseId, index) {
        courses[courseId].assessments.splice(index, 1);
        saveAndRender();
    }

    // Cloud Sync Logic
    async function pushToCloud() {
        const status = document.getElementById('syncStatus');
        const keyInput = document.getElementById('syncKeyInput');
        const panel = document.getElementById('syncPanel');
        
        status.innerText = "Pushing to cloud...";
        panel.classList.add('loading');

        try {
            const isUpdate = keyInput.value.trim().length > 0;
            const method = isUpdate ? 'PUT' : 'POST';
            const url = isUpdate ? `https://jsonblob.com/api/jsonBlob/${keyInput.value}` : `https://jsonblob.com/api/jsonBlob`;

            const res = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify(courses)
            });

            if (method === 'POST') {
                const blobId = res.headers.get('Location').split('/').pop();
                keyInput.value = blobId;
                status.innerText = "Success! Save this Key to use on your phone: " + blobId;
            } else {
                status.innerText = "Cloud Updated Successfully!";
            }
        } catch (e) {
            console.error(e);
            status.innerText = "Error pushing data. Check your connection.";
        }
        panel.classList.remove('loading');
    }

    async function pullFromCloud() {
        const key = document.getElementById('syncKeyInput').value.trim();
        const status = document.getElementById('syncStatus');
        if (!key) return alert("Paste your Sync Key first!");

        status.innerText = "Pulling data...";
        try {
            const res = await fetch(`https://jsonblob.com/api/jsonBlob/${key}`);
            if (!res.ok) throw new Error("Invalid response");
            courses = await res.json();
            saveAndRender();
            status.innerText = "Sync Complete! Data loaded.";
        } catch (e) {
            console.error(e);
            status.innerText = "Error: Invalid Key or Network Issue.";
        }
    }

    // Initial render
    saveAndRender();
</script>
</body>
</html>
