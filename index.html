<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeVibe Pro | T3 UNSW</title>
    <style>
        :root {
            --bg: #0b0f1a;
            --card: #161e2e;
            --accent: #38bdf8;
            --text: #f1f5f9;
            --mtrn: #f43f5e;
            --manf: #10b981;
            --elec: #6366f1;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 1000px; }
        
        header { text-align: center; margin: 2rem 0; }
        h1 { font-size: 2.2rem; margin-bottom: 0.5rem; background: linear-gradient(to right, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Sync Panel */
        .sync-panel {
            background: rgba(56, 189, 248, 0.05);
            border: 1px dashed var(--accent);
            padding: 1.5rem;
            border-radius: 1rem;
            margin-bottom: 2rem;
        }
        .sync-row { display: flex; gap: 10px; margin-top: 10px; }
        
        /* Grid */
        .subject-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 1.5rem; 
        }

        .card { 
            background: var(--card); 
            padding: 1.5rem; 
            border-radius: 1.25rem; 
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
        }
        
        .subject-header { border-bottom: 1px solid #2d3748; padding-bottom: 10px; margin-bottom: 15px; }
        .subject-title { font-size: 1.4rem; font-weight: 800; display: block; }
        .subject-subtitle { font-size: 0.8rem; color: #94a3b8; }

        .big-stat { font-size: 2rem; font-weight: 800; margin: 10px 0; }
        .banked { font-size: 0.9rem; color: #94a3b8; }

        .progress-container { background: #2d3748; height: 10px; border-radius: 5px; margin: 15px 0; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; transition: width 0.8s ease; }

        /* Inputs */
        .input-box { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .row { display: flex; gap: 8px; }
        input { 
            background: #1f2937; border: 1px solid #374151; padding: 10px; 
            border-radius: 6px; color: white; flex: 1; font-size: 0.9rem;
        }
        input:focus { outline: 2px solid var(--accent); border-color: transparent; }

        button { 
            background: var(--accent); border: none; padding: 12px; 
            border-radius: 6px; cursor: pointer; font-weight: 700; color: #0f172a;
            transition: transform 0.1s, opacity 0.2s;
        }
        button:active { transform: scale(0.98); }
        button.secondary { background: #374151; color: white; }
        button.sync-push { background: #6366f1; color: white; }
        button.sync-pull { background: #10b981; color: white; }

        /* List */
        .item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem;
        }
        .item-name { display: block; font-weight: 500; }
        .item-sub { font-size: 0.75rem; color: #64748b; }
        .del-btn { color: #f43f5e; background: none; border: none; cursor: pointer; font-size: 1.2rem; }

        /* Colors */
        .mtrn-bar { background: var(--mtrn); box-shadow: 0 0 10px rgba(244, 63, 94, 0.4); }
        .manf-bar { background: var(--manf); box-shadow: 0 0 10px rgba(16, 185, 129, 0.4); }
        .elec-bar { background: var(--elec); box-shadow: 0 0 10px rgba(99, 102, 241, 0.4); }
        
        .loading { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>GradeVibe Pro</h1>
        <p>T3 Engineering: MTRN3020 • MANF6860 • ELEC4122</p>
    </header>

    <div class="sync-panel" id="syncPanel">
        <label style="font-size: 0.8rem; font-weight: bold; color: var(--accent);">DEVICE SYNC</label>
        <input type="text" id="syncKeyInput" placeholder="Enter Sync Key to Pull or leave blank to Start New">
        <div class="sync-row">
            <button class="sync-push" onclick="pushToCloud()">↑ Push to Cloud</button>
            <button class="sync-pull" onclick="pullFromCloud()">↓ Pull from Cloud</button>
        </div>
        <div id="syncStatus" style="font-size: 0.75rem; margin-top: 10px; text-align: center;"></div>
    </div>

    <div class="subject-grid" id="mainGrid">
        </div>
</div>

<script>
    // Initial structures based on course outlines
    const defaultData = {
        mtrn: {
            name: "MTRN3020",
            desc: "Mechatronic Control",
            color: "mtrn",
            items: [
                { name: "Lab Demos", mark: 0, weight: 20 },
                { name: "Mid-Term", mark: 0, weight: 30 },
                { name: "Final Exam", mark: 0, weight: 50 }
            ]
        },
        manf: {
            name: "MANF6860",
            desc: "Strategic Mfg Mgmt",
            color: "manf",
            items: [
                { name: "Case Study", mark: 0, weight: 20 },
                { name: "Group Project", mark: 0, weight: 40 },
                { name: "Final Assessment", mark: 0, weight: 40 }
            ]
        },
        elec: {
            name: "ELEC4122",
            desc: "Network Planning",
            color: "elec",
            items: [
                { name: "Lab Portfolio", mark: 0, weight: 25 },
                { name: "Design Project", mark: 0, weight: 25 },
                { name: "Final Exam", mark: 0, weight: 50 }
            ]
        }
    };

    let state = JSON.parse(localStorage.getItem('vibe_data')) || defaultData;

    function render() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = '';

        for (const [id, subject] of Object.entries(state)) {
            let bankedMarks = 0;
            let totalWeightSubbed = 0;

            subject.items.forEach(item => {
                if (item.mark > 0) {
                    bankedMarks += (item.mark * (item.weight / 100));
                    totalWeightSubbed += item.weight;
                }
            });

            const currentAvg = totalWeightSubbed > 0 ? (bankedMarks / (totalWeightSubbed / 100)).toFixed(1) : 0;

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="subject-header">
                    <span class="subject-title">${subject.name}</span>
                    <span class="subject-subtitle">${subject.desc}</span>
                </div>
                
                <div class="big-stat">${currentAvg}%</div>
                <div class="banked">Banked: <b>${bankedMarks.toFixed(1)} / 100</b> total marks</div>

                <div class="progress-container">
                    <div class="progress-bar ${subject.color}-bar" style="width: ${currentAvg}%"></div>
                </div>

                <div class="input-box">
                    <input type="text" id="n-${id}" placeholder="Task Name">
                    <div class="row">
                        <input type="number" id="m-${id}" placeholder="Mark %">
                        <input type="number" id="w-${id}" placeholder="Weight %">
                    </div>
                    <button onclick="addItem('${id}')">Add Assessment</button>
                </div>

                <div class="assessment-list">
                    ${subject.items.map((item, index) => `
                        <div class="item">
                            <div>
                                <span class="item-name">${item.name}</span>
                                <span class="item-sub">Weight: ${item.weight}%</span>
                            </div>
                            <div style="display:flex; align-items:center; gap:10px">
                                <b>${item.mark}%</b>
                                <button class="del-btn" onclick="deleteItem('${id}', ${index})">×</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            grid.appendChild(card);
        }
        localStorage.setItem('vibe_data', JSON.stringify(state));
    }

    function addItem(id) {
        const n = document.getElementById(`n-${id}`).value;
        const m = parseFloat(document.getElementById(`m-${id}`).value);
        const w = parseFloat(document.getElementById(`w-${id}`).value);
        if (n && !isNaN(m)) {
            state[id].items.push({ name: n, mark: m, weight: w || 0 });
            render();
        }
    }

    function deleteItem(id, index) {
        state[id].items.splice(index, 1);
        render();
    }

    // --- CLOUD ENGINE (JSONBlob) ---
    async function pushToCloud() {
        const status = document.getElementById('syncStatus');
        const keyInput = document.getElementById('syncKeyInput');
        const panel = document.getElementById('syncPanel');
        
        status.innerText = "Pushing to cloud...";
        panel.classList.add('loading');

        try {
            const method = keyInput.value ? 'PUT' : 'POST';
            const url = keyInput.value ? `https://jsonblob.com/api/jsonBlob/${keyInput.value}` : `https://jsonblob.com/api/jsonBlob`;

            const res = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(state)
            });

            if (method === 'POST') {
                const blobId = res.headers.get('Location').split('/').pop();
                keyInput.value = blobId;
                status.innerText = "Success! Save this Key for other devices: " + blobId;
            } else {
                status.innerText = "Cloud Updated Successfully!";
            }
        } catch (e) {
            status.innerText = "Error pushing data.";
        }
        panel.classList.remove('loading');
    }

    async function pullFromCloud() {
        const key = document.getElementById('syncKeyInput').value;
        const status = document.getElementById('syncStatus');
        if (!key) return alert("Paste your Sync Key first!");

        status.innerText = "Pulling data...";
        try {
            const res = await fetch(`https://jsonblob.com/api/jsonBlob/${key}`);
            if (!res.ok) throw new Error();
            state = await res.json();
            render();
            status.innerText = "Sync Complete!";
        } catch (e) {
            status.innerText = "Error: Invalid Key or Network Issue.";
        }
    }

    render();
</script>

</body>
</html>
